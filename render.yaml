services:
  - type: keyvalue
    name: beexpand-redis
    ipAllowList: []
    plan: free

  - type: web
    name: beexpand-fedeto-crm-email-api
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////app/data/beexpand.db
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: REDIS_URL
        fromService:
          name: beexpand-redis
          type: keyvalue
          property: connectionString
      - key: CORS_ORIGINS
        value: https://aiuken-frontend.onrender.com
    disk:
      name: beexpand-data
      mountPath: /app/data
      sizeGB: 5

  - type: web
    name: aiuken-frontend
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: API_UPSTREAM
        fromService:
          name: beexpand-fedeto-crm-email-api
          type: web
          property: hostport

  - type: worker
    name: beexpand-celery-worker
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A src.celery_app worker --loglevel=info --pool=solo
    envVars:
      - key: REDIS_URL
        fromService:
          name: beexpand-redis
          type: keyvalue
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false

  - type: worker
    name: beexpand-celery-beat
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A src.celery_app beat --loglevel=info
    envVars:
      - key: REDIS_URL
        fromService:
          name: beexpand-redis
          type: keyvalue
          property: connectionString
