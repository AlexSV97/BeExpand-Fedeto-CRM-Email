services:
  - type: web
    name: beexpand-fedeto-crm-email-api
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////app/data/beexpand.db
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: https://beconnect-frontend.onrender.com
    disk:
      name: beexpand-data
      mountPath: /app/data
      sizeGB: 5

  - type: web
    name: beconnect-frontend
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: API_UPSTREAM
        fromService:
          name: beexpand-fedeto-crm-email-api
          type: web
          property: hostport
