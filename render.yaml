databases:
  - name: aiuken-postgres
    databaseName: aiuken
    user: aiuken
    plan: free

services:
  - type: keyvalue
    name: aiuken-redis
    ipAllowList: []
    plan: free

  - type: web
    name: aiuken-soc-email-api
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aiuken-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: REDIS_URL
        fromService:
          name: aiuken-redis
          type: keyvalue
          property: connectionString
      - key: CORS_ORIGINS
        value: https://aiuken-frontend.onrender.com

  - type: web
    name: aiuken-frontend
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: API_UPSTREAM
        fromService:
          name: aiuken-soc-email-api
          type: web
          property: hostport

  - type: worker
    name: aiuken-celery-worker
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A src.celery_app worker --loglevel=info --pool=solo
    envVars:
      - key: REDIS_URL
        fromService:
          name: aiuken-redis
          type: keyvalue
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false

  - type: worker
    name: aiuken-celery-beat
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A src.celery_app beat --loglevel=info
    envVars:
      - key: REDIS_URL
        fromService:
          name: aiuken-redis
          type: keyvalue
          property: connectionString
