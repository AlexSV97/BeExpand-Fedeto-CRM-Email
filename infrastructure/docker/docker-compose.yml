# BeExpand CRM Email — Entorno completo con Docker
# Uso: docker compose -f infrastructure/docker/docker-compose.yml up -d

services:
  # ── Base de datos ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beexpand
      POSTGRES_USER: beexpand
      POSTGRES_PASSWORD: beexpand_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beexpand"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Cache / Task Queue ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API Backend ──
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://beexpand:beexpand_secret@postgres:5432/beexpand
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:3b
      OLLAMA_TIMEOUT: 120
      SECRET_KEY: cambiar-en-produccion
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker (procesa tareas asíncronas) ──
  celery_worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    command: celery -A src.celery_app worker --loglevel=info --pool=solo --concurrency=1
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://beexpand:beexpand_secret@postgres:5432/beexpand
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://host.docker.internal:11434
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (programador de tareas periódicas) ──
  celery_beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    command: celery -A src.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://beexpand:beexpand_secret@postgres:5432/beexpand
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://host.docker.internal:11434
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend ──
  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
