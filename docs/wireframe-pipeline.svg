<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <style>
      .bg { fill: #F9FAFB; }
      .header { fill: #FFFFFF; }
      .header-border { stroke: #E5E7EB; stroke-width: 1; }
      .card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; rx: 8; }
      .tab-inactive { fill: #6B7280; font-size: 14px; }
      .tab-active { fill: #2563EB; font-size: 14px; font-weight: 600; }
      .tab-bg-active { fill: #EFF6FF; }
      .kpi-value { font-size: 24px; font-weight: bold; fill: #111827; }
      .kpi-label { font-size: 12px; fill: #6B7280; }
      .kanban-col { fill: #F3F4F6; rx: 8; }
      .kanban-card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; rx: 6; }
      .kanban-title { font-size: 13px; font-weight: 600; fill: #111827; }
      .kanban-text { font-size: 11px; fill: #6B7280; }
      .kanban-value { font-size: 13px; font-weight: 600; fill: #059669; }
      .kanban-date { font-size: 10px; fill: #9CA3AF; }
      .prob-high { fill: #059669; rx: 3; }
      .prob-med { fill: #D97706; rx: 3; }
      .prob-low { fill: #DC2626; rx: 3; }
      .section-title { font-size: 16px; font-weight: 600; fill: #111827; }
      .add-card { stroke: #D1D5DB; stroke-width: 1; stroke-dasharray: 4; rx: 6; fill: none; }
      .col-header { font-size: 13px; font-weight: 600; }
      .progress-bg { fill: #E5E7EB; rx: 6; }
      .progress-fill { fill: #2563EB; rx: 6; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="900"/>

  <!-- Header -->
  <rect class="header" x="0" y="0" width="1200" height="56"/>
  <line class="header-border" x1="0" y1="56" x2="1200" y2="56"/>
  <text x="24" y="36" font-size="18" font-weight="700" fill="#111827">BeExpand CRM</text>
  <circle cx="1140" cy="28" r="14" fill="#E5E7EB"/>
  <circle cx="1170" cy="28" r="4" fill="#DC2626"/>
  <text x="1100" y="32" font-size="13" fill="#6B7280">Admin</text>

  <!-- Navigation Tabs -->
  <text x="48" y="92" class="tab-inactive">📊 Dashboard</text>
  <text x="180" y="92" class="tab-inactive">👥 Contactos</text>
  <rect x="275" y="72" width="120" height="32" rx="6" class="tab-bg-active"/>
  <text x="300" y="92" class="tab-active">📈 Pipeline</text>
  <line x1="275" y1="108" x2="395" y2="108" stroke="#2563EB" stroke-width="2"/>

  <!-- Section Title -->
  <text x="24" y="148" class="section-title">📈 Pipeline de Oportunidades</text>
  <rect x="1040" y="132" width="136" height="28" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="1052" y="151" font-size="12" fill="#374151">📅 Último mes ▼</text>

  <!-- KPI Cards -->
  <rect x="24" y="168" width="370" height="64" class="card"/>
  <text x="48" y="198" class="kpi-value" fill="#2563EB">45.000€</text>
  <text x="160" y="198" class="kpi-label">Pipeline total</text>

  <rect x="410" y="168" width="370" height="64" class="card"/>
  <text x="434" y="198" class="kpi-value" fill="#D97706">32.000€</text>
  <text x="546" y="198" class="kpi-label">En negociación activo</text>

  <rect x="796" y="168" width="380" height="64" class="card"/>
  <text x="820" y="198" class="kpi-value" fill="#059669">12.000€</text>
  <text x="932" y="198" class="kpi-label">Cerradas este mes</text>

  <!-- Kanban Board -->
  <!-- Column 1: Nueva -->
  <rect x="24" y="252" width="270" height="410" class="kanban-col"/>
  <text x="40" y="276" class="col-header" fill="#6B7280">🆕 NUEVA</text>
  <text x="240" y="276" font-size="12" fill="#9CA3AF">3</text>

  <!-- Card 1 -->
  <rect x="34" y="292" width="250" height="100" class="kanban-card"/>
  <rect x="44" y="300" width="50" height="6" class="prob-low"/>
  <text x="44" y="322" class="kanban-title">TechCorp</text>
  <text x="44" y="338" class="kanban-text">Info productos — Catálogo 2026</text>
  <text x="44" y="360" class="kanban-value">3.000€</text>
  <text x="120" y="360" class="kanban-text">20%</text>
  <text x="44" y="380" class="kanban-date">📅 Cierre: 30/06/2026</text>

  <!-- Card 2 -->
  <rect x="34" y="404" width="250" height="100" class="kanban-card"/>
  <rect x="44" y="412" width="50" height="6" class="prob-low"/>
  <text x="44" y="434" class="kanban-title">Inmob. Gómez</text>
  <text x="44" y="450" class="kanban-text">Nueva construcción — Materiales</text>
  <text x="44" y="472" class="kanban-value">2.000€</text>
  <text x="120" y="472" class="kanban-text">15%</text>
  <text x="44" y="492" class="kanban-date">📅 Cierre: 15/07/2026</text>

  <!-- Card 3 -->
  <rect x="34" y="516" width="250" height="100" class="kanban-card"/>
  <rect x="44" y="524" width="30" height="6" class="prob-low"/>
  <text x="44" y="546" class="kanban-title">Const. Pérez</text>
  <text x="44" y="562" class="kanban-text">Reforma oficinas — Presupuesto</text>
  <text x="44" y="584" class="kanban-value">5.000€</text>
  <text x="120" y="584" class="kanban-text">10%</text>
  <text x="44" y="604" class="kanban-date">📅 Cierre: 01/08/2026</text>

  <!-- Add button -->
  <rect x="34" y="628" width="250" height="32" class="add-card"/>
  <text x="140" y="649" font-size="12" fill="#9CA3AF" text-anchor="middle">+ Añadir</text>

  <!-- Column 2: Calificada -->
  <rect x="310" y="252" width="270" height="410" class="kanban-col"/>
  <text x="326" y="276" class="col-header" fill="#6B7280">🔍 CALIFICADA</text>
  <text x="526" y="276" font-size="12" fill="#9CA3AF">1</text>

  <!-- Card -->
  <rect x="320" y="292" width="250" height="100" class="kanban-card"/>
  <rect x="330" y="300" width="50" height="6" class="prob-med"/>
  <text x="330" y="322" class="kanban-title">BCN Soluciones</text>
  <text x="330" y="338" class="kanban-text">Sistema de seguridad</text>
  <text x="330" y="360" class="kanban-value">8.000€</text>
  <text x="406" y="360" class="kanban-text">40%</text>
  <text x="330" y="380" class="kanban-date">📅 Cierre: 15/06/2026</text>

  <rect x="320" y="628" width="250" height="32" class="add-card"/>
  <text x="426" y="649" font-size="12" fill="#9CA3AF" text-anchor="middle">+ Añadir</text>

  <!-- Column 3: Propuesta -->
  <rect x="596" y="252" width="270" height="410" class="kanban-col"/>
  <text x="612" y="276" class="col-header" fill="#6B7280">💬 PROPUESTA</text>
  <text x="812" y="276" font-size="12" fill="#9CA3AF">1</text>

  <!-- Card -->
  <rect x="606" y="292" width="250" height="100" class="kanban-card"/>
  <rect x="616" y="300" width="70" height="6" class="prob-med"/>
  <text x="616" y="322" class="kanban-title">García SL</text>
  <text x="616" y="338" class="kanban-text">Renovación contrato anual</text>
  <text x="616" y="360" class="kanban-value">15.000€</text>
  <text x="692" y="360" class="kanban-text">50%</text>
  <text x="616" y="380" class="kanban-date">📅 Cierre: 01/06/2026</text>

  <rect x="606" y="628" width="250" height="32" class="add-card"/>
  <text x="712" y="649" font-size="12" fill="#9CA3AF" text-anchor="middle">+ Añadir</text>

  <!-- Column 4: Negociación -->
  <rect x="882" y="252" width="294" height="410" class="kanban-col"/>
  <text x="898" y="276" class="col-header" fill="#6B7280">🤝 NEGOCIACIÓN</text>
  <text x="1100" y="276" font-size="12" fill="#9CA3AF">1</text>

  <!-- Card -->
  <rect x="892" y="292" width="274" height="100" class="kanban-card"/>
  <rect x="902" y="300" width="80" height="6" class="prob-high"/>
  <text x="902" y="322" class="kanban-title">Juan Ruiz</text>
  <text x="902" y="338" class="kanban-text">Contrato mantenimiento anual</text>
  <text x="902" y="360" class="kanban-value">8.000€</text>
  <text x="978" y="360" class="kanban-text">70%</text>
  <text x="902" y="380" class="kanban-date">📅 Cierre: 20/05/2026</text>

  <rect x="892" y="628" width="274" height="32" class="add-card"/>
  <text x="1010" y="649" font-size="12" fill="#9CA3AF" text-anchor="middle">+ Añadir</text>

  <!-- Divider -->
  <line x1="24" y1="680" x2="1176" y2="680" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Projection Section -->
  <text x="24" y="712" class="section-title">📊 Proyección Mensual</text>

  <!-- Objective Bar -->
  <text x="24" y="742" font-size="13" fill="#374151">Objetivo: 50.000€</text>
  <rect x="200" y="728" width="400" height="20" class="progress-bg"/>
  <rect x="200" y="728" width="260" height="20" class="progress-fill"/>
  <text x="620" y="744" font-size="13" font-weight="600" fill="#2563EB">65%</text>

  <text x="24" y="774" font-size="13" fill="#374151">Actual: 32.000€</text>
  <rect x="200" y="760" width="400" height="20" class="progress-bg"/>
  <rect x="200" y="760" width="260" height="20" fill="#D97706" rx="6"/>
  <text x="620" y="776" font-size="13" fill="#6B7280">Meta semanal: 6.250€</text>

  <!-- Mini Chart (ASCII style) -->
  <rect x="24" y="800" width="1152" height="80" class="card"/>
  <text x="40" y="822" font-size="11" fill="#6B7280">Meta ▲</text>
  <text x="40" y="838" font-size="10" fill="#9CA3AF">50K ┤</text>
  <text x="80" y="838" font-size="10" fill="#9CA3AF">███████████████████████████░░░░░░░░░░░░░░░░░░░</text>
  <text x="40" y="854" font-size="10" fill="#9CA3AF">40K ┤</text>
  <text x="80" y="854" font-size="10" fill="#9CA3AF">██████████████████████████████████████░░░░░░░░░</text>
  <text x="40" y="870" font-size="10" fill="#9CA3AF">30K ┤</text>
  <text x="80" y="870" font-size="10" fill="#9CA3AF">███████████████████████████████████████████████</text>
  <text x="580" y="854" font-size="10" fill="#6B7280">S1  S2  S3  S4  S5  S6  S7  S8</text>
</svg>
