server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for dynamic upstream names
    resolver 127.0.0.11:53 8.8.8.8:53 valid=10s;
    resolver_timeout 5s;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # API proxy to upstream service
    location /api/ {
        # API_UPSTREAM variable is passed at runtime (e.g., beexpand-fedeto-crm-email.onrender.com or localhost:8001)
        set $api_upstream "${API_UPSTREAM}";
        
        # Default to http, switch to https for Render services
        set $api_scheme "http://";
        if ($api_upstream ~ "onrender.com") {
            set $api_scheme "https://";
        }
        
        proxy_pass ${api_scheme}${api_upstream};
        
        # Critical headers for proxying
        proxy_set_header Host $api_upstream;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # SSL/TLS for upstream
        proxy_ssl_verify off;
        proxy_ssl_session_reuse off;
        proxy_ssl_server_name on;
    }

    # Static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}